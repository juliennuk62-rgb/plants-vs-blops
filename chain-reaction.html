<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>⚡ Chain Reaction</title>
  <style>
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#000; font-family:'JetBrains Mono','Fira Code',monospace; -webkit-font-smoothing:antialiased; }
    body { display:flex; align-items:center; justify-content:center; }
    #standalone-wrap {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at center, #0a1020 0%, #050810 70%, #000 100%);
      display:flex; align-items:center; justify-content:center;
    }
    /* Le modal LABO2_C s'auto-injecte. On scale son contenu pour remplir le viewport */
    #labo2-c-modal {
      position:fixed !important; inset:0 !important;
      background:transparent !important; backdrop-filter:none !important;
    }
    .l2c-stage {
      transform-origin:center center !important;
    }
    /* Crédit / titre flottant */
    #standalone-credit {
      position:fixed; bottom:8px; right:8px; z-index:5;
      color:rgba(180,200,220,0.5); font-size:11px;
      pointer-events:none; user-select:none; letter-spacing:0.5px;
    }
  </style>
</head>
<body>
  <div id="standalone-wrap"></div>
  <div id="standalone-credit">⚡ Chain Reaction · Plants vs Blops · Standalone</div>

  <!-- ═══ MOCKS pour dépendances absentes ═══ -->
  <script>
    // Force test mode (le module en a besoin pour certains init)
    window.__PVB_TEST_MODE__ = true;
    window.__PVB_EXP_MODE__ = true;
    // LABO2_META : système de stats globales du jeu principal. En standalone : no-op.
    window.LABO2_META = null;
    // showToast / showHint : si appelés par le module, no-op silencieux
    window.showToast = window.showToast || function(msg){ console.log('[toast]', msg); };
    window.showHint = window.showHint || function(msg){ console.log('[hint]', msg); };
    // sfx (audio) : no-op si appelé en dehors du contexte LABO2_C.audio
    window.sfx = window.sfx || function(){};
  </script>

  <!-- ═══ MODULE LABO2_C "Chain Reaction" — copié verbatim depuis experience.html ═══ -->
  <script>
  // ⚡ LABO 2 — FEATURE C "Chain Reaction"
  // Mini-jeu cursor-aimed 45s. Clic = tir. Kill = chaîne lightning.
  // Dispatch 10 agents (2026-04-24). Patches inter-agents inline.
  // ═══════════════════════════════════════════════════════════════════

  /* ── C Agent 1 : Architecte (state + powers + upgrades + persist) ── */
  (function () {
    'use strict';
    window.LABO2_C = window.LABO2_C || {};
    var NS = window.LABO2_C;
    function makeRng(seed) { var a = (seed >>> 0) || 1; return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; var t = a; t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
    NS.makeRng = makeRng;
    NS.PLANT_CENTER = { x: 400, y: 300 };
    NS.RUN_DURATION_MS = 90000;
    NS.SAVE_KEY = 'dev_labo2_c_best';
    NS.PRERUN_POWERS = [
      { id:'overload', name:'Overload', emoji:'♾️', desc:'Chaîne sans limite de sauts', apply:function(st){ st.chainMaxJumps = Infinity; } },
      { id:'spark',    name:'Spark',    emoji:'⚡', desc:'Rayon de chaîne +50px',      apply:function(st){ st.chainRadius += 50; } },
      { id:'zap',      name:'Zap',      emoji:'💥', desc:'+40% damage de base',        apply:function(st){ st.baseDamage *= 1.4; } }
    ];
    NS.INRUN_UPGRADES = [
      { id:'up_chain',    emoji:'🔗', name:'+1 saut',      desc:'Chaîne peut sauter 1 fois de plus',       apply:function(st){ if (st.chainMaxJumps !== Infinity) st.chainMaxJumps++; } },
      { id:'up_radius',   emoji:'📡', name:'+50px rayon',   desc:'Chaîne porte plus loin',                  apply:function(st){ st.chainRadius += 50; } },
      { id:'up_damage',   emoji:'⚡', name:'+15% damage',   desc:'Chaîne plus dévastatrice',                apply:function(st){ st.baseDamage *= 1.15; } },
      { id:'up_falloff',  emoji:'🔁', name:'-5% falloff',   desc:'La chaîne perd moins par saut',           apply:function(st){ st.damageFalloff = Math.min(0.99, st.damageFalloff + 0.05); } },
      { id:'up_cooldown', emoji:'⏱', name:'-10% cooldown',  desc:'Tu tires plus souvent',                    apply:function(st){ st.cooldownMs = Math.max(150, st.cooldownMs * 0.9); } },
      { id:'up_pierce',   emoji:'🎯', name:'Pierce +1',     desc:'Le tir direct traverse +1 ennemi',        apply:function(st){ st.pierce = (st.pierce||0) + 1; } },
      { id:'up_splash',   emoji:'💥', name:'Splash final',  desc:'Dernier ennemi de chaîne explose 80px',   apply:function(st){ st.finalSplash = true; } },
      { id:'up_heal',     emoji:'💚', name:'Soin +30 HP',   desc:'Soigne la plante',                        apply:function(st){ st.plant.hp = Math.min(st.plant.maxHp, (st.plant.hp||0) + 30); } },
      { id:'up_harmonic', emoji:'🎵', name:'Résonance Lock', desc:'Les charges de résonance ne s\'effacent plus sur ennemis vivants', apply:function(st){ st.harmonicLock = true; } },
      { id:'up_conductor',emoji:'🔌', name:'Conducteur',     desc:'+10% chance que chaque ennemi soit conductif (chain sans perte)',  apply:function(st){ st.conductorBonus = (st.conductorBonus||0) + 0.1; } }
    ];
    NS.state = {};
    NS.newGame = function () {
      var s = NS.state;
      for (var k in s) { if (Object.prototype.hasOwnProperty.call(s, k)) delete s[k]; }
      s.running = false; s.isPaused = false; s.timer = NS.RUN_DURATION_MS; s.tElapsed = 0;
      s.plant = { x: NS.PLANT_CENTER.x, y: NS.PLANT_CENTER.y, hp: 100, maxHp: 100, radius: 25 };
      s.enemies = []; s.particles = []; s.popups = []; s.chainVisibleArcs = []; s.chainPending = [];
      s.cursor = { x: NS.PLANT_CENTER.x, y: NS.PLANT_CENTER.y, inCanvas: false };
      s.cooldown = 0; s.cooldownMs = 600;
      // POLISH : damageFalloff 0.85 → 0.9 pour chaîne plus longue
      s.baseDamage = 10; s.chainRadius = 150; s.chainMaxJumps = 15; s.damageFalloff = 0.9;
      s.pierce = 0; s.finalSplash = false;
      s.kills = 0; s.score = 0; s.chainMaxThisRun = 0; s._chainRunningLength = 0;
      s.upgrades = []; s.killsSinceLastUpgrade = 0; s.levelupPending = false; s.prerunPower = null;
      // PULSE PROTOCOL state
      s._lastAct = null; s.calm1EliteSpawned = false; s.calm2EliteSpawned = false;
      s.scoreMultUntil = 0; s.scoreMult = 1; s.plantShieldUntil = 0;
      s.actAnnounceT = 0; s.actAnnounceName = '';
      // RÉSONANCE + BESTIAIRE state
      s.harmonicLock = false; s.conductorBonus = 0;
      s.shakeT = 0; s.shakeMag = 0; s.shakeInitT = 0; s.hitstopUntil = 0; s.screenFlash = null; s.slowmoUntil = 0;
      s.godMode = false; s.rng = makeRng(Date.now()); s.gameOverReached = false; s.startedAt = Date.now();
      if (NS.combat) { NS.combat._spawnAccum = 0; NS.combat._enemyId = 0; }
      return s;
    };
    NS.applyPrerunPower = function (powerId) {
      var s = NS.state; if (!s || !powerId) return false;
      for (var i = 0; i < NS.PRERUN_POWERS.length; i++) { var p = NS.PRERUN_POWERS[i]; if (p.id === powerId) { try { p.apply(s); } catch(e){} s.prerunPower = powerId; return true; } }
      return false;
    };
    NS.applyUpgrade = function (upgradeId) {
      var s = NS.state; if (!s || !upgradeId) return false;
      for (var i = 0; i < NS.INRUN_UPGRADES.length; i++) { var u = NS.INRUN_UPGRADES[i]; if (u.id === upgradeId) { try { u.apply(s); } catch(e){} s.upgrades = s.upgrades || []; s.upgrades.push(upgradeId); return true; } }
      return false;
    };
    NS.loadBest = function () {
      try { var raw = localStorage.getItem(NS.SAVE_KEY); if (!raw) return { bestScore:0, bestChain:0, runs:0 };
        var p = JSON.parse(raw);
        return { bestScore:+p.bestScore||0, bestChain:+p.bestChain||0, runs:+p.runs||0 };
      } catch (e) { return { bestScore:0, bestChain:0, runs:0 }; }
    };
    NS.saveBest = function (stats) {
      var prev = NS.loadBest();
      var sc = (stats && stats.score) || 0;
      var ch = (stats && stats.chainMaxThisRun) || 0;
      var flags = { isNewBestScore: sc > prev.bestScore, isNewBestChain: ch > prev.bestChain };
      try { localStorage.setItem(NS.SAVE_KEY, JSON.stringify({ bestScore: Math.max(prev.bestScore, sc), bestChain: Math.max(prev.bestChain, ch), runs: (prev.runs|0)+1 })); } catch(e){}
      return flags;
    };
  })();

  /* ── C Agent 8 : Tuning (chargé avant combat) ───────────────────── */
  (function () {
    'use strict';
    window.LABO2_C = window.LABO2_C || {};
    var T = window.LABO2_C.tuning = {};
    T.RUN_DURATION_MS = 90000;
    T.BASE_DAMAGE = 10; T.CHAIN_RADIUS = 150; T.CHAIN_MAX_JUMPS = 15; T.DAMAGE_FALLOFF = 0.9;
    T.BASE_COOLDOWN_MS = 600; T.PLANT_MAX_HP = 100;
    // POLISH : durée 45s → 90s, curves rescalées /90 avec brute à partir t=40
    T.enemySpawnRate = function(tSec){ var t = Math.max(0, Math.min(90, tSec)); return 1.0 + Math.pow(t / 90, 1.3) * 4.5; };
    T.enemyHP = function(tSec){ var t = Math.max(0, Math.min(90, tSec)); return Math.max(2, 3 + (t / 90) * 5); };
    T.enemySpeed = function(tSec){ var t = Math.max(0, Math.min(90, tSec)); return 50 + (t / 90) * 60; };
    T.bruteSpawnRate = function(tSec){ if (tSec < 40) return 0; var t = Math.max(40, Math.min(90, tSec)); return ((t - 40) / 50) * 0.2; };
    T.scoreForChain = function(chainLength){ var n = Math.max(0, chainLength|0); return n * n * 10; };
    T.KILLS_PER_UPGRADE = 5; T.BIG_CHAIN_THRESHOLD = 10; T.MEGA_CHAIN_THRESHOLD = 20;
    T.CHAIN_PROPAGATION_DELAY_MS = 40; T.CHAIN_ARC_LIFE_MS = 300;
    T.ENEMY_PLANT_CONTACT_DAMAGE = 2; T.ENEMY_PLANT_CONTACT_DAMAGE_BRUTE = 5;
    T.ENEMY_RADIUS = 12; T.BRUTE_RADIUS = 16; T.PLANT_RADIUS = 25; T.CURSOR_HIT_TOLERANCE = 12;
    T.ENEMY_COLORS = ['#ff4444', '#ff5a55', '#ee3333']; T.BRUTE_COLOR = '#8844ff';
    T.ENEMY_EMOJIS = ['🧟']; T.BRUTE_EMOJI = '👹';
    // BESTIAIRE ÉLECTRIQUE : 6 enemy types + 2 élites. hp/speed sont des multiplicateurs du base.
    T.ENEMY_TYPES = {
      grunt:     { hp: 1.0, speed: 1.0, radius: 12, emoji: '🧟', color: '#ff4444', weight: 100, introT: 0 },
      brute:     { hp: 2.0, speed: 0.7, radius: 16, emoji: '👹', color: '#8844ff', weight: 10,  introT: 40 },
      dodger:    { hp: 0.6, speed: 1.4, radius: 10, emoji: '🦎', color: '#44ff88', weight: 18,  introT: 15 },
      swarmer:   { hp: 0.4, speed: 1.5, radius: 8,  emoji: '🐝', color: '#ffee44', weight: 16,  introT: 20, groupSize: 5 },
      reflector: { hp: 1.5, speed: 0.8, radius: 13, emoji: '🪞', color: '#cceeff', weight: 8,   introT: 35 },
      splitter:  { hp: 1.5, speed: 0.9, radius: 12, emoji: '🧬', color: '#ff88cc', weight: 12,  introT: 50 },
      prowler:   { hp: 4.0, speed: 0.5, radius: 22, emoji: '🐺', color: '#ffaa00', elite: true },
      juggernaut:{ hp: 5.0, speed: 0.3, radius: 28, emoji: '🦏', color: '#bb44ff', elite: true }
    };
    // PULSE PROTOCOL : 3 actes + 2 calm windows. tint = overlay canvas full-screen.
    T.ACTS = {
      surge:    { start:0,  end:25, name:'ACTE I · SURGE',    shortName:'SURGE',    tint:'rgba(20,60,100,0.08)',  spawnMult:1.0 },
      calm1:    { start:25, end:30, name:'CALM · PROWLER',    shortName:'PROWLER',  tint:'rgba(100,80,20,0.18)',  spawnMult:0 },
      fracture: { start:30, end:55, name:'ACTE II · FRACTURE', shortName:'FRACTURE', tint:'rgba(100,30,30,0.10)',  spawnMult:1.0 },
      calm2:    { start:55, end:60, name:'CALM · JUGGERNAUT', shortName:'JUGGERNAUT', tint:'rgba(80,30,120,0.20)', spawnMult:0 },
      climax:   { start:60, end:90, name:'ACTE III · CLIMAX', shortName:'CLIMAX',   tint:'rgba(140,60,80,0.15)',  spawnMult:1.5 }
    };
    T.getAct = function(tSec) {
      var keys = ['surge','calm1','fracture','calm2','climax'];
      for (var i = 0; i < keys.length; i++) { var k = keys[i], a = T.ACTS[k]; if (tSec >= a.start && tSec < a.end) return { key:k, def:a }; }
      return { key:'climax', def:T.ACTS.climax };
    };
    T.pickEnemyType = function(tSec) {
      var active = []; var total = 0;
      Object.keys(T.ENEMY_TYPES).forEach(function(key) {
        var t = T.ENEMY_TYPES[key];
        if (t.elite) return;
        if ((t.introT || 0) > tSec) return;
        active.push({ key: key, weight: t.weight || 10 });
        total += t.weight || 10;
      });
      if (total === 0 || !active.length) return 'grunt';
      var r = Math.random() * total;
      for (var i = 0; i < active.length; i++) { r -= active[i].weight; if (r <= 0) return active[i].key; }
      return active[0].key;
    };
    // RÉSONANCE HARMONIQUE
    T.RESONANCE_STACK_MAX = 3;
    T.RESONANCE_TIMER_MS = 2000;
    T.RESONANCE_AOE_BASE = 60;
    T.RESONANCE_AOE_PER_STACK = 30;
    T.RESONANCE_DMG_MULT_PER_STACK = 0.5;
  })();

  /* ── C Agent 5 : Particules (lightning arcs + sparks) ──────────── */
  (function(){
    window.LABO2_C = window.LABO2_C || {};
    window.LABO2_C.state = window.LABO2_C.state || {};
    window.LABO2_C.state.particles = window.LABO2_C.state.particles || [];
    var MAX_PARTICLES = 500;
    function rand(min, max) { return min + Math.random() * (max - min); }
    function pickColor(colors) { return colors[Math.floor(Math.random() * colors.length)]; }
    function makeP(x, y, vx, vy, life, size, color, gravity, additive, trail, kind) {
      return { x:x, y:y, vx:vx, vy:vy, life:life, maxLife:life, size:size, baseSize:size, color:color, gravity:gravity||0, additive:!!additive, trail:!!trail, prevX:x, prevY:y, kind:kind||'dot' };
    }
    function emit(x, y, type, count, options) {
      options = options || {}; var parts = window.LABO2_C.state.particles; var i;
      if (type === 'blood') { count = count || 12;
        var cols = ['#ff2a2a', '#d01818', '#a81010', '#8a0a0a'];
        for (i = 0; i < count; i++) { var a = Math.random()*Math.PI*2, s = rand(80, 220); parts.push(makeP(x, y, Math.cos(a)*s, Math.sin(a)*s, rand(500, 800), rand(2, 4), pickColor(cols), 280, false, false, 'dot')); }
      } else if (type === 'spark') { count = count || 6;
        var cols2 = ['#88eeff', '#ffffff', '#bbf5ff'];
        for (i = 0; i < count; i++) { var a2 = Math.random()*Math.PI*2, s2 = rand(200, 400); parts.push(makeP(x, y, Math.cos(a2)*s2, Math.sin(a2)*s2, rand(150, 300), rand(1, 3), pickColor(cols2), 0, true, false, 'dot')); }
      } else if (type === 'muzzle') { count = count || 8;
        var cols3 = ['#ffff88', '#ffffff', '#ffffaa']; var baseAng = options.angle || 0; var spread = options.spread || Math.PI*2;
        for (i = 0; i < count; i++) { var a3 = baseAng + (Math.random()-0.5)*spread, s3 = rand(50, 150); parts.push(makeP(x, y, Math.cos(a3)*s3, Math.sin(a3)*s3, rand(70, 130), rand(3, 6), pickColor(cols3), 0, true, false, 'dot')); }
      } else if (type === 'impact') {
        parts.push({ x:x, y:y, vx:0, vy:0, life:300, maxLife:300, size:4, baseSize:4, targetSize:30, color:'#ffffff', gravity:0, additive:true, trail:false, kind:'ring' });
      } else if (type === 'chainZap') { count = count || 20;
        var cols4 = ['#88eeff', '#ffffff', '#aaf0ff', '#ccffff'];
        for (i = 0; i < count; i++) { var a4 = (i/count)*Math.PI*2 + Math.random()*0.3, s4 = rand(300, 600); parts.push(makeP(x, y, Math.cos(a4)*s4, Math.sin(a4)*s4, rand(200, 400), rand(2, 4), pickColor(cols4), 0, true, true, 'dot')); }
      } else if (type === 'bigChainBurst') { count = count || 60;
        var cols5 = ['#ffff66', '#ffffff', '#88eeff', '#ffee88', '#bbf5ff'];
        for (i = 0; i < count; i++) { var a5 = Math.random()*Math.PI*2, s5 = rand(300, 700); parts.push(makeP(x, y, Math.cos(a5)*s5, Math.sin(a5)*s5, rand(900, 1400), rand(4, 8), pickColor(cols5), 150, true, true, 'dot')); }
      }
      if (parts.length > MAX_PARTICLES) parts.splice(0, parts.length - MAX_PARTICLES);
    }
    function update(dtMs) {
      var parts = window.LABO2_C.state.particles; var dt = dtMs / 1000;
      for (var i = parts.length - 1; i >= 0; i--) {
        var p = parts[i];
        p.prevX = p.x; p.prevY = p.y;
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.gravity||0) * dt; p.life -= dtMs;
        if (p.kind === 'ring' && p.targetSize) { var prog = 1 - (p.life / p.maxLife); p.size = p.baseSize + (p.targetSize - p.baseSize) * prog; }
        if (p.life <= 0) parts.splice(i, 1);
      }
    }
    function draw(ctx) {
      var parts = window.LABO2_C.state.particles, i, p, alpha;
      ctx.save(); ctx.globalCompositeOperation = 'source-over';
      for (i = 0; i < parts.length; i++) { p = parts[i]; if (p.additive || p.kind === 'ring') continue; alpha = Math.max(0, p.life / p.maxLife); ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
      ctx.restore();
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      for (i = 0; i < parts.length; i++) { p = parts[i]; if (!p.additive || p.kind === 'ring') continue; alpha = Math.max(0, p.life / p.maxLife);
        if (p.trail) { ctx.globalAlpha = alpha * 0.5; ctx.strokeStyle = p.color; ctx.lineWidth = p.size; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(p.prevX, p.prevY); ctx.lineTo(p.x, p.y); ctx.stroke(); }
        ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      for (i = 0; i < parts.length; i++) { p = parts[i]; if (p.kind !== 'ring') continue; alpha = Math.max(0, p.life / p.maxLife); ctx.globalAlpha = alpha; ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.stroke(); }
      ctx.restore();
    }
    window.LABO2_C.particles = { emit:emit, update:update, draw:draw };
  })();

  /* ── C Agent 6 : Audio (zap pitch-ramped + big chain boom) ─────── */
  (function(){
    'use strict';
    window.LABO2_C = window.LABO2_C || {};
    var audio = window.LABO2_C.audio = window.LABO2_C.audio || {};
    var ctx = null, master = null, muted = false;
    function noise(c, durSec) { var len = Math.max(1, Math.floor(c.sampleRate * durSec)); var buf = c.createBuffer(1, len, c.sampleRate); var d = buf.getChannelData(0); for (var i = 0; i < len; i++) d[i] = Math.random()*2-1; var src = c.createBufferSource(); src.buffer = buf; return src; }
    function now() { return ctx.currentTime; }
    function ok() { return ctx && master && !muted; }
    audio.init = function() {
      if (ctx) { if (ctx.state === 'suspended') try { ctx.resume(); } catch(e){} return; }
      if (window.__labo2c_ctx__) ctx = window.__labo2c_ctx__;
      else { var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return; ctx = new AC(); window.__labo2c_ctx__ = ctx; }
      master = ctx.createGain(); master.gain.value = 0.4; master.connect(ctx.destination);
    };
    audio.shoot = function() {
      if (!ok()) return; var t = now();
      var o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(1200, t); o.frequency.exponentialRampToValueAtTime(300, t+0.08);
      var g = ctx.createGain(); g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.1, t+0.01); g.gain.exponentialRampToValueAtTime(0.0001, t+0.1);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.12);
      var n = noise(ctx, 0.06); var hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2000;
      var ng = ctx.createGain(); ng.gain.setValueAtTime(0.08, t); ng.gain.exponentialRampToValueAtTime(0.0001, t+0.06);
      n.connect(hp); hp.connect(ng); ng.connect(master); n.start(t); n.stop(t+0.07);
    };
    audio.zap = function(jumpIndex) {
      if (!ok()) return; var t = now(); var base = Math.min(1600, 400 + (jumpIndex|0) * 80);
      var saw = ctx.createOscillator(); saw.type='sawtooth'; saw.frequency.setValueAtTime(base, t); saw.frequency.exponentialRampToValueAtTime(base*1.6, t+0.05);
      var sq = ctx.createOscillator(); sq.type='square'; sq.frequency.setValueAtTime(base*1.5, t); sq.frequency.exponentialRampToValueAtTime(base*2.2, t+0.05);
      var g = ctx.createGain(); g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.0001, t+0.06);
      saw.connect(g); sq.connect(g); g.connect(master); saw.start(t); sq.start(t); saw.stop(t+0.07); sq.stop(t+0.07);

    L.injectCss = function() {
      if (document.getElementById('labo2-c-shell-styles')) return;

      s.textContent = L.CSS_SHELL + '\n' + (L.hud && L.hud.css ? L.hud.css : '') + '\n' + (L.tutorial && L.tutorial.css ? L.tutorial.css : '');

      modalRoot.innerHTML = '<div class="l2c-stage"><div class="l2c-cheat-hint">H:debug · B:burst · 1/2/3:power</div>' +
        '<div class="l2c-top-btns">' +
          '<button class="l2c-top-btn" data-l2c-fullscreen title="Plein écran">⛶</button>' +
          '<button class="l2c-top-btn l2c-pause-btn" data-l2c-pause title="Pause">⏸</button>' +
          '<button class="l2c-top-btn l2c-stop-btn" data-l2c-stop title="Arrêter la run">⏹</button>' +
          '<button class="l2c-top-btn l2c-close" data-l2c-close title="Fermer">✕</button>' +

        '<canvas class="l2c-canvas" width="800" height="600"></canvas>' +
        '<div class="l2c-pause-overlay" data-l2c-pauseoverlay style="display:none;">' +
          '<div class="l2c-pause-box">' +
            '<div class="l2c-pause-title">⏸ PAUSE</div>' +
            '<div class="l2c-pause-sub">La run est en pause. Respire.</div>' +
            '<button class="l2c-pause-resume" data-l2c-resume>▶ REPRENDRE</button>' +
          '</div>' +
        '</div>' +
      '</div>';
      document.body.appendChild(modalRoot);
      modalRoot.querySelector('[data-l2c-close]').onclick = function(){ L.closeModal(); };
      // Fullscreen toggle
      modalRoot.querySelector('[data-l2c-fullscreen]').onclick = function(){
        if (!document.fullscreenElement) { if (modalRoot.requestFullscreen) modalRoot.requestFullscreen().catch(function(){}); }
        else { if (document.exitFullscreen) document.exitFullscreen().catch(function(){}); }
      };
      // Pause toggle
      modalRoot.querySelector('[data-l2c-pause]').onclick = function(){
        if (!L.state || !L.state.running) return;
        L.state.isPaused = !L.state.isPaused;
        updatePauseOverlay();
      };
      modalRoot.querySelector('[data-l2c-resume]').onclick = function(){
        if (!L.state) return;
        L.state.isPaused = false;
        updatePauseOverlay();
      };
      // Stop (fin de run immédiate)
      modalRoot.querySelector('[data-l2c-stop]').onclick = function(){
        if (!L.state || !L.state.running) return;
        if (!confirm('Arrêter la run maintenant ?')) return;
        L.endRun();
      };
      modalRoot.addEventListener('click', function(e){ if (e.target === modalRoot) L.closeModal(); });
      // Fullscreen scale handler
      document.addEventListener('fullscreenchange', applyFullscreenScale);
      window.addEventListener('resize', applyFullscreenScale);
      return modalRoot;
    };
    function updatePauseOverlay() {
      if (!modalRoot) return;
      var ov = modalRoot.querySelector('[data-l2c-pauseoverlay]');
      if (ov) ov.style.display = (L.state && L.state.isPaused) ? 'flex' : 'none';
    }
    function applyFullscreenScale() {
      if (!modalRoot) return;
      var stage = modalRoot.querySelector('.l2c-stage');
      if (!stage) return;
      if (document.fullscreenElement === modalRoot) {
        var s = Math.min(window.innerWidth / 800, window.innerHeight / 600);
        stage.style.transform = 'scale(' + s + ')';

        stage.style.transform = '';
      }
    }
    L.openModal = function() {
      L.injectCss(); L.buildModal();
      modalRoot.classList.add('open');
      var stage = modalRoot.querySelector('.l2c-stage');
      canvas = modalRoot.querySelector('.l2c-canvas');
      ctx = canvas.getContext('2d');
      if (L.hud.destroy) L.hud.destroy();
      L.hud.build(stage);
      if (L.audio && L.audio.init) L.audio.init();
      L.newGame();
      if (L.juice && L.juice.reset) L.juice.reset();
      L.aim.attach(canvas);
      if (L.debug && L.debug.hudBuild) L.debug.hudBuild(stage);
      if (L.debug && L.debug.enable) L.debug.enable();
      levelupModalOpen = false;
      // Étape 1 : modal pre-run power → puis tutorial → puis GO
      L.hud.showPrerunModal(function(powerId) {

          L.state.running = true;
          lastT = performance.now();

        });
      });
    };
    L.closeModal = function() {
      if (document.fullscreenElement === modalRoot && document.exitFullscreen) {
        document.exitFullscreen().catch(function(){});
      }
      if (rafHandle) { cancelAnimationFrame(rafHandle); rafHandle = null; }
      if (L.state) L.state.running = false;
      if (L.aim && L.aim.detach) L.aim.detach();
      if (L.debug && L.debug.disable) L.debug.disable();
      if (L.debug && L.debug.hudDestroy) L.debug.hudDestroy();
      if (L.hud && L.hud.destroy) L.hud.destroy();
      if (resultsEl) { if (resultsEl.parentNode) resultsEl.parentNode.removeChild(resultsEl); resultsEl = null; }
      if (modalRoot) modalRoot.classList.remove('open');
      levelupModalOpen = false;
    };
    L.loop = function(nowT) {
      if (!L.state || !L.state.running) return;
      var dt = Math.min(50, nowT - lastT);
      lastT = nowT;
      // Slowmo ramp
      if (L.juice && L.juice.isSlowmo()) dt *= L.juice.slowmoFactor();
      // Hitstop
      var hitstopped = L.juice && L.juice.isHitstopped && L.juice.isHitstopped();
      // Level-up modal trigger (before updates so game paused)
      if (L.state.levelupPending && !levelupModalOpen) {
        levelupModalOpen = true;
        if (L.audio) L.audio.levelUpJingle();
        L.hud.showLevelUpModal(function(upgradeId) {
          L.state.levelupPending = false;
          levelupModalOpen = false;
        });
      }
      if (!hitstopped && !L.state.levelupPending) {
        L.combat.tick(dt); // tick handles timer decrement + spawn + movement
        L.chain.tick(dt);
        L.particles.update(dt);
        if (L.juice) { L.juice.updatePopups(dt); L.juice.updateScreenFlash(dt); L.juice.updateShake(dt); L.juice.updateChromatic(dt); L.juice.updateZoom(dt); }
      }
      render();
      if (L.hud && L.hud.update) L.hud.update(L.state, L.loadBest ? L.loadBest() : {});
      if (L.debug && L.debug.hudUpdate) L.debug.hudUpdate(dt);
      if (L.state.timer <= 0 || L.state.gameOverReached) { L.endRun(); return; }
      rafHandle = requestAnimationFrame(L.loop);
    };
    function render() {
      if (!ctx) return;
      var s = L.state;
      ctx.setTransform(1,0,0,1,0,0);
      ctx.fillStyle = '#050810'; ctx.fillRect(0, 0, 800, 600);
      // PULSE PROTOCOL : tint overlay selon acte en cours
      var tSec = (s.tElapsed || 0) / 1000;
      var actInfo = (L.tuning && L.tuning.getAct) ? L.tuning.getAct(tSec) : null;
      if (actInfo && actInfo.def && actInfo.def.tint) {
        ctx.fillStyle = actInfo.def.tint;
        ctx.fillRect(0, 0, 800, 600);
      }
      ctx.save();
      if (L.juice && L.juice.applyZoom) L.juice.applyZoom(ctx);
      if (L.juice && L.juice.applyShake) L.juice.applyShake(ctx);
      // Draw plant (central)
      var plant = s.plant;
      ctx.save();
      ctx.shadowColor = '#33ff66'; ctx.shadowBlur = 15;
      ctx.font = '42px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🌿', plant.x, plant.y);
      var hpRatio = Math.max(0, plant.hp / plant.maxHp);
      ctx.strokeStyle = hpRatio > 0.5 ? '#33ff66' : (hpRatio > 0.2 ? '#ffaa00' : '#ff3333');
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(plant.x, plant.y, 30, -Math.PI/2, -Math.PI/2 + hpRatio * Math.PI * 2); ctx.stroke();
      // SHIELD ring (si prowler/juggernaut kill récent)
      if (s.plantShieldUntil && Date.now() < s.plantShieldUntil) {
        ctx.strokeStyle = '#44ff88'; ctx.lineWidth = 4;
        ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() / 80);
        ctx.beginPath(); ctx.arc(plant.x, plant.y, 42, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
      ctx.restore();
      // Draw enemies
      for (var i = 0; i < s.enemies.length; i++) {
        var e = s.enemies[i];
        // Elite halo pulsant
        if (e.isElite) {
          ctx.save();
          ctx.shadowColor = e.color; ctx.shadowBlur = 18;
          ctx.strokeStyle = e.color; ctx.lineWidth = 3;
          ctx.globalAlpha = 0.6 + 0.3 * Math.sin(Date.now() / 200);
          ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 5, 0, Math.PI*2); ctx.stroke();
          ctx.restore();
        }
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
        ctx.font = ((e.isElite ? 28 : (e.isBrute ? 22 : 16))) + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(e.emoji || '🧟', e.x, e.y);
        // RÉSONANCE dots autour de l'ennemi (indicateur primed)
        if (e.resonance > 0) {
          for (var ri = 0; ri < e.resonance; ri++) {
            var ra = (ri / 3) * Math.PI * 2 - Math.PI / 2 + (Date.now() / 500);
            var rx = e.x + Math.cos(ra) * (e.radius + 8);
            var ry = e.y + Math.sin(ra) * (e.radius + 8);
            ctx.fillStyle = '#ff66dd';
            ctx.shadowColor = '#ff66dd'; ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(rx, ry, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
          }
        }
        if (e.hp < e.maxHp) {
          var bw = e.isElite ? 40 : 24, bh = 3, bx = e.x - bw/2, by = e.y - e.radius - 6;
          ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(bx, by, bw, bh);
          var r = Math.max(0, e.hp / e.maxHp);
          ctx.fillStyle = r > 0.5 ? '#33ff66' : (r > 0.25 ? '#ffaa00' : '#ff4444');
          ctx.fillRect(bx, by, bw * r, bh);
        }
      }
      // Chain arcs
      if (L.chain && L.chain.drawArcs) L.chain.drawArcs(ctx);
      // Particles
      if (L.particles && L.particles.draw) L.particles.draw(ctx);
      // Popups
      if (L.juice && L.juice.drawPopups) L.juice.drawPopups(ctx);
      ctx.restore();
      // Overlays (no shake/zoom)
      if (L.juice && L.juice.drawScreenFlash) L.juice.drawScreenFlash(ctx);
      if (L.juice && L.juice.drawChromatic) L.juice.drawChromatic(ctx);
      // Reticle (last, no shake for precision)
      if (L.aim && L.aim.drawReticle) L.aim.drawReticle(ctx);
    }
    L.endRun = function() {
      if (rafHandle) { cancelAnimationFrame(rafHandle); rafHandle = null; }
      L.state.running = false;
      var s = L.state;
      var flags = L.saveBest({ score:s.score, chainMaxThisRun:s.chainMaxThisRun });
      if (L.audio && L.audio.end) L.audio.end(s.score, flags.isNewBestScore);

        try {
          if (LABO2_META.economy && LABO2_META.economy.formula) grainesGained = LABO2_META.economy.formula('feature_C', payload) || 0;
          if (LABO2_META.economy && LABO2_META.economy.earn) grainesGained = LABO2_META.economy.earn(grainesGained, 'feature_C', payload);
          if (LABO2_META.state && LABO2_META.state.stats) {
            LABO2_META.state.stats.perFeature = LABO2_META.state.stats.perFeature || {};
            var pf = LABO2_META.state.stats.perFeature.C = LABO2_META.state.stats.perFeature.C || { runs:0, bestScore:0, bestChain:0 };
            pf.runs = (pf.runs||0) + 1;
            if (s.score > (pf.bestScore||0)) pf.bestScore = s.score;
            if (s.chainMaxThisRun > (pf.bestChain||0)) pf.bestChain = s.chainMaxThisRun;
            LABO2_META.state.stats.totalRuns = (LABO2_META.state.stats.totalRuns||0) + 1;
            LABO2_META.state.stats.totalKills = (LABO2_META.state.stats.totalKills||0) + s.kills;
            if (LABO2_META.persist && LABO2_META.persist.save) LABO2_META.persist.save();
          }
          if (LABO2_META.achievements && LABO2_META.achievements.check) LABO2_META.achievements.check('run_end', payload);
          if (LABO2_META.daily && LABO2_META.daily.isActive) { if (LABO2_META.daily.submitRun) LABO2_META.daily.submitRun('C', s.score, payload); if (LABO2_META.daily.endDailyRun) LABO2_META.daily.endDailyRun(); }
        } catch(e) { console.warn('[LABO2_C endRun meta]', e); }
      }
      showResults(s, flags, grainesGained);
    };
    function showResults(s, flags, grainesGained) {
      var stage = modalRoot.querySelector('.l2c-stage');
      resultsEl = document.createElement('div'); resultsEl.className = 'l2c-results';
      var headline = s.plant.hp <= 0 ? 'GAME OVER' : 'FIN DE CHAIN';
      var newBestBadge = flags.isNewBestScore ? '<div class="l2c-new-best">⭐ NEW BEST SCORE ⭐</div>' : '';
      var newBestChain = flags.isNewBestChain ? '<div class="l2c-new-best">⚡ NEW BEST CHAIN ⚡</div>' : '';
      resultsEl.innerHTML =
        '<h2>' + headline + '</h2>' + newBestBadge + newBestChain +
        '<div class="l2c-scores">' +
          '<div class="label">SCORE</div><div class="value">' + s.score.toLocaleString() + '</div>' +
          '<div class="label">CHAIN MAX</div><div class="value">×' + s.chainMaxThisRun + '</div>' +
          '<div class="label">KILLS</div><div class="value">' + s.kills + '</div>' +

        '</div>' +
        '<div class="l2c-graines-gained">+ ' + grainesGained + ' 🌰 graines</div>' +
        '<div class="l2c-btns">' +
          '<button class="l2c-btn l2c-btn-primary" data-l2c-restart>🔄 RELANCER</button>' +
          '<button class="l2c-btn l2c-btn-ghost" data-l2c-close>FERMER</button>' +

      requestAnimationFrame(function() { resultsEl.classList.add('open'); });

        if (L.juice && L.juice.reset) L.juice.reset();
        levelupModalOpen = false;
        L.hud.showPrerunModal(function() {
          L.state.running = true; lastT = performance.now(); rafHandle = requestAnimationFrame(L.loop);

      resultsEl.querySelector('[data-l2c-close]').onclick = function() { L.closeModal(); };
    }
  })();

  <!-- ═══ BOOT STANDALONE : ouvre le modal + scale fullscreen + upscale 4K ═══ -->
  <script>
    (function bootStandalone() {
      function fitStage() {
        var stage = document.querySelector('.l2c-stage');
        if (!stage) return;
        var viewportW = window.innerWidth;
        var viewportH = window.innerHeight;
        // Le stage natif fait 800×600 + 50px haut pour les boutons
        var nativeW = 800, nativeH = 650;
        var scale = Math.min(viewportW / nativeW, viewportH / nativeH) * 0.95;
        stage.style.transform = 'scale(' + scale + ')';
      }
      // Upscale 4K : on rend le canvas en haute résolution physique tout en gardant
      // les coords logiques 800×600 inchangées (le code LABO2_C continue à raisonner
      // en 800×600). On override les getters canvas.width/height pour que les checks
      // internes (dont coords() qui fait canvas.width/rect.width) soient préservés.
      function upscaleCanvas() {
        var canvas = document.querySelector('.l2c-canvas');
        if (!canvas) return setTimeout(upscaleCanvas, 80);
        if (canvas._upscaled) return;
        // Détermine le scale factor : DPR × 2 capé à 5 (Full HD sur 1080p, 4K sur 4K, ultra sur Retina)
        var dpr = window.devicePixelRatio || 1;
        var SCALE = Math.min(5, Math.max(2, Math.ceil(dpr * 2.5)));
        var lw = canvas.width || 800;
        var lh = canvas.height || 600;
        // Backing store haute résolution
        canvas.width = Math.round(lw * SCALE);
        canvas.height = Math.round(lh * SCALE);
        // CSS conserve la taille logique (le stage transform CSS scale ça visuellement)
        canvas.style.width = lw + 'px';
        canvas.style.height = lh + 'px';
        // Override des getters pour que le module LABO2_C voie toujours 800/600
        // (sinon le code coords() multiplie les coords souris par SCALE et tout casse)
        Object.defineProperty(canvas, 'width', {
          configurable: true,
          get: function() { return lw; },
          set: function(v) { /* swallow further sets to preserve backing store */ }
        });
        Object.defineProperty(canvas, 'height', {
          configurable: true,
          get: function() { return lh; },
          set: function(v) { /* swallow */ }
        });
        // Apply scale au context : tous les draws en coords 800×600 logiques sont
        // rendus sur les pixels haute résolution
        var ctx = canvas.getContext('2d');
        ctx.scale(SCALE, SCALE);
        if (ctx.imageSmoothingQuality !== undefined) ctx.imageSmoothingQuality = 'high';
        canvas._upscaled = true;
        console.log('[Chain Reaction] Upscaled ' + SCALE + '× : backing ' + (lw*SCALE) + '×' + (lh*SCALE) + ' / display ' + lw + '×' + lh + ' (DPR=' + dpr + ')');
      }
      function openWhenReady() {
        if (!window.LABO2_C || !window.LABO2_C.openModal) {
          return setTimeout(openWhenReady, 50);
        }
        try {
          window.LABO2_C.openModal();
          // Premier fit après que le modal est dans le DOM
          setTimeout(fitStage, 100);
          setTimeout(fitStage, 300);
          // Upscale après l'init du canvas (quand le getContext a été appelé par le module)
          setTimeout(upscaleCanvas, 200);
          setTimeout(upscaleCanvas, 600); // 2e essai au cas où
        } catch (e) {
          console.error('Boot Chain Reaction failed:', e);
          document.getElementById('standalone-wrap').innerHTML =
            '<div style="color:#ff6688;text-align:center;font-family:monospace;">' +
            '<h1>⚠ Erreur au boot</h1>' +
            '<pre style="background:#220;padding:14px;border-radius:8px;color:#ff8;text-align:left;max-width:600px;overflow:auto;">' +
            (e && e.stack ? e.stack : String(e)) +
            '</pre></div>';
        }
      }
      // Resize handler
      window.addEventListener('resize', fitStage);
      // Boot quand le DOM est prêt
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', openWhenReady);
      } else {
        openWhenReady();
      }
    })();
  </script>
</body>
</html>
